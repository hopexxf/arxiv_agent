# arXiv Agent 配置模板
# 复制为 settings.yml 后编辑

# 搜索配置
search:
  keywords_file: "config/search_keywords.txt"
  categories:
    - "cs.NI"      # Networking and Internet Architecture
    - "cs.SY"      # Systems and Control
    - "eess.SP"    # Signal Processing
  date_range_days: 30
  retry_cooldown_base: 60       # 429后每次静默等待秒数（乘以attempt）
  max_retries: 10               # 最大重试次数（包含短重试+长静默重试）
  mirror_url: ""                # arXiv镜像URL，留空则使用官方(https://export.arxiv.org)

# 处理配置
processing:
  max_papers_per_day: 5
  download_pdf: true
  extract_affiliation: true
  generate_chinese_summary: true
  quality_assessment: true       # 是否进行论文质量评估，默认开启

# LLM配置
# 优先级: use_openclaw=true > api_key存在 > 方案A(pending)
llm:
  use_openclaw: true             # 是否使用 OpenClaw 网关 LLM
  api_key: ""                    # 直接调用 LLM API 的密钥
  model: "gpt-3.5-turbo"
  base_url: "https://api.openai.com/v1"
  temperature: 0.3
  max_tokens: 1000

# 存储配置
storage:
  papers_json: "data/papers.json"
  pdf_dir: "data/pdfs"
  keep_days: 90                  # 论文保留天数（3个月）
  max_display_papers: 10         # 网站显示论文数量上限

# 网站配置
viewer:
  title: "论文追踪报道"
